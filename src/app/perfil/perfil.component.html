<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>
    
</head>
<body>

    <div class="container">
        <div class="left-panel">
            <img src="ilustracion.png" alt="Ilustración de inicio de sesión">
        </div>

        <div class="right-panel">
            <h2>¿Cómo quieres iniciar sesión?</h2>

            <form>
                <div class="input-group">
                    <label for="correo">Correo</label>
                    <input type="text" id="correo" placeholder="Ingresa tu correo electronico">
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Ingresa tu contraseña">
                </div>

                <button class="login-button">Iniciar sesión</button>
            </form>

            <div class="extra-links">
                <a href="#">Soporte técnico y contacto</a>
                <a href="#">Tengo problemas de acceso</a>
            </div>
            <hr>
        </div>
    </div>

</body>
</html>
